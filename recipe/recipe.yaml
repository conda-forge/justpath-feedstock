schema_version: 1

context:
  name: justpath
  version: "0.1.0"
  python_min: "3.12"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/justpath-${{ version }}.tar.gz
  sha256: d890d60558f2321e844a6aa162bc2c19c277f999d5dafef587215e0d4e955efa

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pathit = justpath.show:typer_app
      - justpath = justpath.show:typer_app

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=69
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - typer >=0.24.1
    - rich >=14.3.3

tests:
  - python:
      imports:
        - justpath
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - pathit --help
      - justpath --help

about:
  summary: Explore PATH environment variable on Windows and Linux.
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/epogrebnyak/justpath

extra:
  recipe-maintainers:
    - thewchan
